  PROTOCOLO DE ACTUALIZACIÓN (para cualquier sesión futura):
  1. Los datos viven en las constantes JS del <script> (LAST_AUDIT, DATA, DEBT, EST, PLAN,
     CHANGELOG, CLOSED_COUNT, DECISIONS, DECISION_PENDS, TESTS, REFS). La lógica de render
     NO se toca en actualizaciones normales.
  2. Ticks en localStorage con IDs ESTABLES (jamás renombrar ids). Ámbar = marcado sin
     verificar; verde = solo vía re-auditoría (borrar de DATA y sumar a CLOSED_COUNT).
  3. Re-auditoría: verificar EN CÓDIGO los ámbar, borrar confirmados de DATA/DEBT/EST/PLAN,
     CLOSED_COUNT += n, entrada fechada en CHANGELOG, actualizar TESTS/REFS/mapa/stack,
     node --check al JS, redeploy A LA MISMA URL (parámetro url del tool Artifact), commit
     en rama + PR (en modo orquestado el PR del tracker es bookkeeping: automerge).
  4. Calibración vigente: unidad=sesiones (~2-4h) · actores=fede(hifede1)+Claude, misma
     cuenta GitHub (firma = comentario "✅ validado" en el PR) · metodología=directa ·
     modo=orquestado (despacho activo: issues [SNN] con labels encargo+sesion-NN).

 gates:[

  {n:"Estructura del plugin (3 comandos)", cmd:"CI validate.yml — automatizado", st:"grn", f:"2026-07-13"},
  {n:"Sintaxis JS del tracker", cmd:"CI validate.yml (node --check, extracción por tag exacto) + obligatorio antes de cada deploy", st:"grn", f:"2026-07-13"},

 ],

  {n:"Issue → /orquestar → PR+informe → firma → merge → re-auditoría", st:"amb", note:"Ejercitado UNA vez completo (issue #4 → PR #11, firma por merge del validador, CI verde, 2026-07-13). Sin automatización que lo clave; las ramas cambios/veto/silencio siguen sin ejercitar."},

 ],

};

const REFS = {
 items:[
  {tema:"openhands-agentes", trg:["orquestador","critic","verificador","confirmation mode","microagents","stuck detection","firma por riesgo","presupuesto","loop autónomo"], f:"2026-07-13", usa:"S05 (critic) · S07 (ConfirmRisky/presupuesto) · adopciones v1.8 documentadas (triggers, freno anti-loop)"},
  {tema:"claude-code-plugins", trg:["plugin","marketplace","instalación","comandos","namespace","reload","distribución"], f:"2026-07-13", usa:"S04 (instalación local) · cualquier evolución del empaquetado"}
 ],
 faltantes:[],
 nota:"docs/business/ no aplica: este repo ES la herramienta; su «negocio» son los comandos."
};

const MAPA = [
 {n:"Auditoría", b:"b-audit", e:"auto"},
 {n:"Tracker (7 pestañas)", b:"b-audit", e:"auto · despacho"},
 {n:"Issues (cola)", b:"b-prox", e:"auto"},
 {n:"/orquestar navega y ejecuta", b:"b-orq", e:"auto"},
 {n:"PR + informe de verificación", b:"b-orq", e:"🧑 FIRMA («✅ validado»)"},
 {n:"Merge + re-auditoría", b:"b-orq", e:"auto"},

const STACK = [
 {capa:"Comandos (el producto)", items:"3 prompts markdown: audit-tracker · proximo-encargo · orquestar", warn:"orquestar: dormant — 0 ejecuciones"},
 {capa:"Distribución", items:"marketplace.json (fede-tools) + plugin.json (v1.8.0) · instala vía CLI local", warn:"no funciona en sesiones web (por diseño de Claude Code)"},
 {capa:"Runtime del loop", items:"Claude Code + gh · GitHub Issues (cola) · PRs (validación) · comentarios (rastro)", warn:"sin CI propio que proteja los manifiestos"},

const RECORRIDOS = [
 "Un pendiente nace en la auditoría → ficha con criterios → issue [SNN] → el orquestador lo ejecuta → PR con informe → fede comenta «✅ validado» → merge → re-auditoría lo pasa a verde acá.",
 "Una decisión estructural aparece en el plan de ataque → el orquestador FRENA y pregunta con opciones → la respuesta vale al instante → entra como ficha ADR en la próxima re-auditoría.",
 "Una referencia se genera en un encargo (con triggers) → otro encargo posterior la carga por trigger sin que su ficha la linkee → el catálogo la muestra con quién la usa.",

];

/* ============ RENDER (no tocar en actualizaciones normales) ============ */
const $ = (s)=>document.querySelector(s);
const TICKS_KEY = "at-selftracker-ticks-v1";
const ticks = new Set(JSON.parse(localStorage.getItem(TICKS_KEY)||"[]"));
function saveTicks(){ localStorage.setItem(TICKS_KEY, JSON.stringify([...ticks])); }
const STN = {curso:"🟠 EN CURSO", pend:"⚪ PENDIENTE", maqueta:"⚠️ MAQUETA", hecho:"✅ HECHO"};
function esc(x){ return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function allPends(){ return DATA.flatMap(z=>z.blocks.flatMap(b=>b.pends)); }

function renderMeta(){
  const tot = allPends().length, amb=[...ticks].length;
  const est = allPends().reduce((a,p)=>a+p.est,0);
  $("#meta").innerHTML = [
    ["Última auditoría", LAST_AUDIT],["Cerrados (verde)", CLOSED_COUNT],
    ["Marcados (ámbar)", amb],["Pendientes abiertos", tot],
    ["Carga estimada", est+" sesiones"],["Modo", CALIB.loop]
  ].map(m=>`<div class="m">${esc(m[0])}<b>${esc(m[1])}</b></div>`).join("");
}

const TABS = [["board","📋 Tablero"],["plan","🗓️ Plan"],["mapa","🗺️ Mapa"],["stack","🔧 Stack"],["dec","⚖️ Decisiones"],["tests","🧪 Tests"],["refs","📚 Referencias"]];
function renderTabs(){
  $("#tabs").innerHTML = TABS.map(t=>`<a href="#${t[0]}" id="tl-${t[0]}">${t[1]}</a>`).join("");
}
function show(tab){
  if(!TABS.some(t=>t[0]===tab)) tab="board";
  document.querySelectorAll("section.tab").forEach(s=>s.classList.remove("on"));
  document.querySelectorAll("nav.tabs a").forEach(a=>a.classList.remove("on"));
  $("#tab-"+tab).classList.add("on"); $("#tl-"+tab).classList.add("on");
}
window.addEventListener("hashchange",()=>show(location.hash.slice(1)));

function tickRow(p){
  const on = ticks.has(p.id);
  return `<label class="tick${on?" on":""}"><input type="checkbox" data-id="${p.id}" ${on?"checked":""}>
    <span>${esc(p.txt)} <span class="chip">${esc(p.ses)}</span></span>
    <span class="est">${p.est||"—"} ses.</span></label>`;
}
function fichaHTML(b){
  const f=b.ficha;
  return `<details><summary>Ficha de trabajo</summary><div class="ficha">
    <h4>🎯 PLANTEAMIENTO</h4><p>${esc(f.plant)}</p>
    <h4>🛠️ CÓMO TRABAJARLO</h4><ul>${f.met.map(m=>`<li>${esc(m)}</li>`).join("")}</ul>
    <h4>✅ CRITERIOS DE CIERRE</h4><ul>${f.crit.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>
    ${f.refs.length?`<h4>📚 REFERENCIAS</h4><ul>${f.refs.map(r=>`<li>${esc(r)}</li>`).join("")}</ul>`:""}
    ${b.pends.length?`<h4>PENDIENTES</h4>${b.pends.map(tickRow).join("")}`:""}
    <button class="copy" data-b="${b.id}">Copiar encargo</button>
  </div></details>`;
}
function encargoText(b){
  const f=b.ficha;
  return `ENCARGO — ${b.n} (repo hifede1/claude-audit-tracker)\n\n🎯 PLANTEAMIENTO\n${f.plant}\n\n🛠️ MÉTODO\n${f.met.map((m,i)=>(i+1)+". "+m).join("\n")}\n\n✅ CRITERIOS DE CIERRE (verificables)\n${f.crit.map(c=>"- "+c).join("\n")}\n\n${f.refs.length?"📚 REFERENCIAS\n"+f.refs.join("\n")+"\n\n":""}PENDIENTES ABIERTOS\n${b.pends.filter(p=>!ticks.has(p.id)).map(p=>"- ["+p.ses+"] "+p.txt).join("\n")||"(ninguno)"}\n\nCriterio de HECHO: punta a punta + errores y bordes + gates reales. Los tres o no está hecho.`;
}
function renderBoard(){
  let h = `<p class="note">Calibración: ${esc(CALIB.unidad)} · ${esc(CALIB.actores)} · metodología ${esc(CALIB.met)} · modo ${esc(CALIB.loop)}. Tick = ámbar (sin verificar). Verde solo vía re-auditoría.</p>`;
  for(const z of DATA){
    h += `<h2>${esc(z.zona)}</h2>`;
    for(const b of z.blocks){
      h += `<div class="card ${b.st}" id="card-${b.id}">
        <div class="bh"><h3>${esc(b.n)}</h3><span class="pill p-${b.st}">${STN[b.st]}</span></div>
        <p class="kv"><b>Qué existe:</b> ${esc(b.existe)}</p>
        <p class="kv"><b>Qué falta:</b> ${esc(b.falta)}</p>
        <p class="ev">evidencia: ${esc(b.ev)}</p>
        ${fichaHTML(b)}</div>`;
    }
  }
  h += `<h2>Maqueta / deuda transversal</h2><div class="card pend"><ul>${DEBT.map(d=>`<li>${esc(d)}</li>`).join("")}</ul></div>`;
  h += `<h2>Historial</h2><div class="hist">${CHANGELOG.map(c=>`<p><b>${esc(c.f)}</b> — ${esc(c.t)}</p>`).join("")}</div>`;
  $("#tab-board").innerHTML = h;
}
function renderPlan(){
  const done = PLAN.filter(s=>s.cierra.every(id=>ticks.has(id)||!allPends().some(p=>p.id===id)));
  let next = PLAN.find(s=>!done.includes(s) && s.deps.every(d=>done.some(x=>x.s===d)));
  let h = `<p class="note">Total estimado: ${PLAN.reduce((a,s)=>a+s.est,0)} sesiones · según ticks: ${done.length} completada(s) · próxima resaltada. Con despacho activo, cada sesión = un issue [SNN].</p>`;
  for(const s of PLAN){
    const isNext = next && next.s===s.s;
    h += `<div class="card ${done.includes(s)?"hecho":isNext?"curso":"pend"}">
      <div class="bh"><h3>${s.s} — ${esc(s.t)}</h3>
      <span class="chip">${s.est} ses.</span><span class="chip">${esc(s.badge)}</span>
      ${s.deps.length?`<span class="chip">⛓️ ${s.deps.join(", ")}</span>`:""}
      ${isNext?`<span class="pill p-curso">PRÓXIMA</span>`:""}</div>
      <p class="kv"><b>Objetivo:</b> ${esc(s.obj)}</p>
      <ul>${s.tareas.map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
      <p class="ev">cierra: ${s.cierra.join(", ")}</p>
      <button class="copy" data-s="${s.s}">Copiar encargo de sesión</button></div>`;
  }
  $("#tab-plan").innerHTML = h;
}
function sesText(s){
  return `ENCARGO DE SESIÓN ${s.s} — ${s.t}\nRepo: hifede1/claude-audit-tracker · tratamiento: ${s.badge}\n\nOBJETIVO\n${s.obj}\n\n⛓️ PRERREQUISITOS: ${s.deps.length?s.deps.join(", "):"ninguno"}\n\nTAREAS\n${s.tareas.map((t,i)=>(i+1)+". "+t).join("\n")}\n\nCIERRA: ${s.cierra.join(", ")}\n\nCriterio de HECHO: punta a punta + errores y bordes + gates reales.`;
}
function renderMapa(){
  let h = `<p class="note">El flujo end-to-end del producto. Nodo = clic abre su bloque en el tablero. Las aristas dicen qué dispara el paso — mirá dónde el sistema fluye solo y dónde depende del humano.</p><div class="flow">`;
  MAPA.forEach((n,i)=>{
    const st = (DATA.flatMap(z=>z.blocks).find(b=>b.id===n.b)||{}).st||"pend";
    h += `<div class="fn ${st}" data-go="${n.b}">${esc(n.n)}</div>`;
    if(n.e!==null && i<MAPA.length-1) h += `<div class="fe">${esc(n.e)}<b>→</b></div>`;
  });
  h += `</div><p class="note">La única arista humana del sistema es la FIRMA. Todo lo demás es automático — y por eso la firma es sagrada: es tu único punto de control en el ciclo.</p>`;
  $("#tab-mapa").innerHTML = h;
}
function renderStack(){
  let h = `<div class="tblwrap"><table><tr><th>CAPA</th><th>QUÉ HAY</th><th>⚠️</th></tr>`;
  h += STACK.map(s=>`<tr><td><b>${esc(s.capa)}</b></td><td>${esc(s.items)}</td><td>${esc(s.warn)}</td></tr>`).join("");
  h += `</table></div><h2>Recorridos reales («si entendés estos, entendés el sistema»)</h2>`;
  h += RECORRIDOS.map((r,i)=>`<div class="card pend"><b>${i+1}.</b> ${esc(r)}</div>`).join("");
  $("#tab-stack").innerHTML = h;
}
function renderDec(){
  let h = `<p class="note">Registro ADR: el PORQUÉ del sistema. Read-only — no toca ticks ni progreso. Las pendientes derivadas de un pendiente del tablero desaparecen solas cuando este se cierra.</p>`;
  for(const d of DECISIONS){
    h += `<div class="card hecho"><div class="bh"><h3>${esc(d.t)}</h3><span class="pill p-hecho">TOMADA</span><span class="dchip">${esc(d.f)}</span></div>
    <p class="kv"><b>Contexto:</b> ${esc(d.ctx)}</p><p class="kv"><b>Opciones:</b> ${esc(d.ops)}</p>
    <p class="kv"><b>Porqué:</b> ${esc(d.por)}</p><p class="kv"><b>Consecuencias:</b> ${esc(d.cons)}</p></div>`;
  }
  h += `<h2>Pendientes de decisión (derivadas del tablero)</h2>`;
  for(const dp of DECISION_PENDS){
    const p = allPends().find(x=>x.id===dp.pendId);
    if(!p) continue;
    h += `<div class="card curso"><div class="bh"><h3>${esc(p.txt)}</h3><span class="pill p-curso">PENDIENTE</span><span class="dchip">${esc(p.ses)}</span></div>
    <p class="kv">${esc(dp.note)}</p></div>`;
  }
  $("#tab-dec").innerHTML = h;
}
function renderTests(){
  let h = `<h2>Gates reales</h2><div class="tblwrap"><table><tr><th>GATE</th><th>CÓMO CORRE</th><th>ESTADO</th><th>FECHA</th></tr>`;
  h += TESTS.gates.map(g=>`<tr><td><b>${esc(g.n)}</b></td><td class="mono">${esc(g.cmd)}</td><td><span class="pill p-${g.st}">${g.st==="grn"?"VERDE":g.st==="amb"?"ÁMBAR":"ROJO"}</span></td><td>${esc(g.f)}</td></tr>`).join("");
  h += `</table></div><h2>Cobertura a altitud de flujo</h2>`;
  h += TESTS.flujos.map(f=>`<div class="card ${f.st==="grn"?"hecho":f.st==="amb"?"curso":"maqueta"}"><div class="bh"><h3>${esc(f.n)}</h3><span class="pill p-${f.st}">${f.st==="grn"?"🟢 CLAVADO":f.st==="amb"?"🟠 PARCIAL":"🔴 SIN EJERCITAR"}</span></div><p class="kv">${esc(f.note)}</p></div>`).join("");
  h += `<h2>Deuda de verificación</h2><div class="card pend"><p class="kv">${esc(TESTS.deuda)}</p></div>`;
  $("#tab-tests").innerHTML = h;
}
function renderRefs(){
  let h = `<p class="note">${esc(REFS.nota)}</p><h2>Catálogo</h2>`;
  if(!REFS.items.length) h += `<div class="card pend"><p class="kv"><b>docs/references/ está vacío.</b> Para una herramienta que exige referencias destiladas a los demás, esto es la deuda más irónica del repo.</p></div>`;
  h += REFS.items.map(r=>`<div class="card hecho"><div class="bh"><h3>docs/references/${esc(r.tema)}.md</h3><span class="pill p-grn">🟢 FRESCA</span><span class="rchip">${esc(r.f)}</span></div>
    <p class="kv"><b>Triggers:</b> ${r.trg.map(t=>`<span class="rchip">${esc(t)}</span>`).join(" ")}</p>
    <p class="kv"><b>Quién la usa:</b> ${esc(r.usa)}</p></div>`).join("");
  if(REFS.faltantes.length){
    h += `<h2>🔴 Faltantes (generar ANTES del encargo que las necesita)</h2>`;
    h += REFS.faltantes.map(r=>`<div class="card maqueta"><div class="bh"><h3>docs/references/${esc(r.tema)}.md</h3><span class="pill p-red">FALTANTE</span><span class="rchip">${esc(r.ses)}</span></div>
    <p class="kv"><b>Triggers:</b> ${r.trg.map(t=>`<span class="rchip">${esc(t)}</span>`).join(" ")}</p>
    <p class="kv"><b>Quién la necesita:</b> ${esc(r.para)}</p></div>`).join("");
  }
  $("#tab-refs").innerHTML = h;
}

document.addEventListener("change",(e)=>{
  const id = e.target && e.target.getAttribute && e.target.getAttribute("data-id");
  if(!id) return;
  if(e.target.checked) ticks.add(id); else ticks.delete(id);
  saveTicks(); renderMeta(); renderBoard(); renderPlan(); show(location.hash.slice(1)||"board");
});
document.addEventListener("click",(e)=>{
  const t = e.target;
  const go = t.getAttribute && t.getAttribute("data-go");
  if(go){ location.hash="board"; const el=$("#card-"+go); if(el) el.scrollIntoView({behavior:"smooth"}); return; }
  const bid = t.getAttribute && t.getAttribute("data-b");
  const sid = t.getAttribute && t.getAttribute("data-s");
  if(!bid && !sid) return;
  const txt = bid ? encargoText(DATA.flatMap(z=>z.blocks).find(b=>b.id===bid))
                  : sesText(PLAN.find(s=>s.s===sid));
  const done = ()=>{ t.textContent="Copiado ✓"; setTimeout(()=>{t.textContent = bid?"Copiar encargo":"Copiar encargo de sesión";},1500); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done)); }
  else fallback(txt,done);
});
function fallback(txt,done){
  const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");}catch(_){/*noop*/} document.body.removeChild(ta); done();
}

renderMeta(); renderTabs(); renderBoard(); renderPlan(); renderMapa(); renderStack(); renderDec(); renderTests(); renderRefs();
show(location.hash.slice(1)||"board");
</script>
