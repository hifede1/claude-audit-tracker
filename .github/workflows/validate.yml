name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manifiestos JSON válidos
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('marketplace.json OK')"
          node -e "JSON.parse(require('fs').readFileSync('plugins/audit-tracker/.claude-plugin/plugin.json','utf8')); console.log('plugin.json OK')"

      - name: Estructura del plugin (3 comandos)
        run: |
          test -f plugins/audit-tracker/commands/audit-tracker.md
          test -f plugins/audit-tracker/commands/proximo-encargo.md
          test -f plugins/audit-tracker/commands/orquestar.md
          echo "comandos OK"

      - name: Sintaxis JS de hooks y scripts
        run: |
          for f in plugins/audit-tracker/hooks/*.js scripts/*.js; do
            node --check "$f"
          done
          echo "hooks y scripts OK"

      - name: Consistencia (marketplace↔plugin, versión↔CHANGELOG, hooks↔archivos, estado.json↔tracker)
        run: node scripts/check-consistency.js

      - name: Sintaxis JS del tracker
        run: |
          f=docs/audits/claude-audit-tracker-tracker.html
          if [ -f "$f" ]; then
            awk '/^<script>$/{x=1;next}/^<\/script>$/{x=0}x' "$f" > /tmp/tracker.js
            node --check /tmp/tracker.js
            echo "tracker JS OK"
          else
            echo "sin tracker aún — se omite"
          fi
